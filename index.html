<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Happy Birthday!</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #ff9a9e, #fad0c4);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
            max-width: 400px;
        }

        h1 {
            color: #ff4b5c;
            font-size: 36px;
        }

        p {
            font-size: 18px;
            color: #333;
        }

        .button {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #ff4b5c;
            color: white;
            text-decoration: none;
            border-radius: 25px;
            transition: 0.3s;
        }

        .button:hover {
            background-color: #ff1e3c;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>🎉 Happy Birthday! 🎂</h1>
        <p>Wishing you a day filled with love, laughter, and happiness.</p>
        <p>May all your dreams come true and your year be amazing!</p>
        <a href="#" class="button">Celebrate 🎈</a>
    </div>

</body>
</html>
